replicaCount: 1

image:
  repository: ghcr.io/formancehq/ledger
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8093

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
