name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan — platform/
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: platform/
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy scan — services/
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: services/
          severity: CRITICAL,HIGH
          exit-code: 1
