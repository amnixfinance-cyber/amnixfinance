name: Validate Infrastructure Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════════════════════
  # JOB 1 — YAML Lint
  # النطاق: platform/ + services/ + .github/
  # السابق: platform/ فقط ← ناقص
  # ════════════════════════════════════════════════════════
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML — platform/ + services/ + .github/
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: platform/ services/ .github/
          config_data: |
            extends: relaxed
            ignore: |
              services/*/k8s/templates/
              services/*/k8s/tests/
              services/*/.goreleaser/
              services/*/.goreleaser.yml
              services/*/.goreleaser.yaml
              services/*/.golangci.yml
              services/*/.mockery.yaml
            rules:
              line-length:
                max: 150
              truthy:
                allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']

  # ════════════════════════════════════════════════════════
  # JOB 2 — Helm Lint + Template
  # 4 مجموعات بناءً على نوع كل chart
  # ════════════════════════════════════════════════════════
  helm-validate:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: Azure/setup-helm@v5.0.0

      # ── Group A: Custom charts — no external deps ──────
      # billing, analytics, search, notifications
      # نتحكم فيهم كاملاً → --strict
      - name: "[A] Custom charts — lint & template"
        run: |
          for svc in billing analytics search notifications; do
            echo "━━━ $svc ━━━"
            helm lint services/$svc/k8s/ --strict
            helm template amnix-$svc services/$svc/k8s/ > /dev/null
            echo "✅ $svc — OK"
          done

      # ── Group B: Upstream standalone — no sub-chart deps ──
      # ingestion (redpanda connect), realtime (centrifugo)
      # upstream code → لا --strict
      - name: "[B] Upstream standalone — lint & template"
        run: |
          for svc in ingestion realtime; do
            echo "━━━ $svc ━━━"
            helm lint services/$svc/k8s/
            helm template amnix-$svc services/$svc/k8s/ > /dev/null
            echo "✅ $svc — OK"
          done

      # ── Group C: processing (risingwave) — bitnami sub-chart deps ──
      # dependencies: common + postgresql + minio من bitnami
      # charts/ غير موجود → helm dependency update أولاً
      - name: "[C] Add bitnami repo for processing"
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: "[C] Update processing dependencies"
        run: helm dependency update services/processing/k8s/

      - name: "[C] processing — lint & template"
        run: |
          echo "━━━ processing ━━━"
          helm lint services/processing/k8s/
          helm template amnix-processing services/processing/k8s/ > /dev/null
          echo "✅ processing — OK"

      # ── Group D: auth (kratos) — file:// dep مفقود ──
      # dependency: ory-commons من file://../ory-commons
      # المسار غير موجود في الـ repo → --skip-deps
      - name: "[D] auth — lint & template (--skip-deps)"
        run: |
          echo "━━━ auth ━━━"
          echo "⚠️  ory-commons (file://../ory-commons) absent — using --skip-deps"
          helm lint services/auth/k8s/ --skip-deps
          helm template amnix-auth services/auth/k8s/ --skip-deps > /dev/null
          echo "✅ auth — OK"

  # ════════════════════════════════════════════════════════
  # JOB 3 — Trivy Security Scan
  # النطاق: platform/ + services/
  # السابق: platform/ فقط ← ناقص
  # ════════════════════════════════════════════════════════
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan — platform/
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: platform/
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy scan — services/
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: services/
          severity: CRITICAL,HIGH
          exit-code: 1

  # ════════════════════════════════════════════════════════
  # JOB 4 — Kustomize Validate
  # النطاق: كل services/*/k8s/kustomization.yaml
  # كل service عنده نفس 4 ملفات:
  #   templates/networkpolicy.yaml
  #   templates/scaledobject.yaml
  #   templates/serviceaccount.yaml
  #   templates/poddisruptionbudget.yaml
  # ════════════════════════════════════════════════════════
  kustomize-validate:
    name: Kustomize Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: Azure/setup-helm@v5.0.0

      - name: "[A] Validate 4 templates — billing ingestion realtime analytics search notifications"
        run: |
          for svc in billing ingestion realtime analytics search notifications; do
            echo "━━━ $svc ━━━"
            helm template amnix-$svc services/$svc/k8s/ \
              --show-only templates/networkpolicy.yaml \
              --show-only templates/scaledobject.yaml \
              --show-only templates/serviceaccount.yaml \
              --show-only templates/poddisruptionbudget.yaml \
              > /dev/null
            echo "✅ $svc — OK"
          done

      - name: "[B] auth — validate 4 templates (--skip-deps)"
        run: |
          echo "━━━ auth ━━━"
          helm template amnix-auth services/auth/k8s/ \
            --skip-deps \
            --show-only templates/networkpolicy.yaml \
            --show-only templates/scaledobject.yaml \
            --show-only templates/serviceaccount.yaml \
            --show-only templates/poddisruptionbudget.yaml \
            > /dev/null
          echo "✅ auth — OK"

      - name: "[C] Add bitnami repo for processing"
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: "[C] Update processing dependencies"
        run: helm dependency update services/processing/k8s/

      - name: "[C] processing — validate 4 templates"
        run: |
          echo "━━━ processing ━━━"
          helm template amnix-processing services/processing/k8s/ \
            --show-only templates/networkpolicy.yaml \
            --show-only templates/scaledobject.yaml \
            --show-only templates/serviceaccount.yaml \
            --show-only templates/poddisruptionbudget.yaml \
            > /dev/null
          echo "✅ processing — OK"
