name: Validate Platform Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: platform/
          config_data: |
            extends: relaxed
            rules:
              line-length:
                max: 150

  helm-validate:
    name: Helm Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: Azure/setup-helm@v5.0.0

      - name: Add Helm repos
        run: |
          helm repo add cilium https://helm.cilium.io
          helm repo add linkerd https://helm.linkerd.io/stable
          helm repo add apisix https://charts.apiseven.com
          helm repo add redpanda https://charts.redpanda.com
          helm repo add qdrant https://qdrant.github.io/qdrant-helm
          helm repo add quickwit https://helm.quickwit.io
          helm repo add minio https://charts.min.io
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add falco https://falcosecurity.github.io/charts
          helm repo add temporal https://go.temporal.io/helm-charts
          helm repo add ory https://k8s.ory.sh/helm/charts
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts
          helm repo add backstage https://backstage.github.io/charts
          helm repo add longhorn https://charts.longhorn.io
          helm repo add loft https://charts.loft.sh
          helm repo add open-policy-agent https://open-policy-agent.github.io/gatekeeper/charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo add jetstack https://charts.jetstack.io
          helm repo add lago https://getlago.github.io/lago-helm-charts
          helm repo add risingwave https://risingwavelabs.github.io/helm-charts
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo add weaviate https://weaviate.github.io/weaviate-helm
          helm repo add analytics https://victoriametrics.github.io/helm-charts
          helm repo add billing https://charts.formance.com
          helm repo add search https://weaviate.github.io/weaviate-helm
          helm repo update

      - name: Validate Helm charts exist
        run: |
          helm search repo cilium/cilium --version 1.19.3
          helm search repo linkerd/linkerd-crds --version 1.8.0
          helm search repo linkerd/linkerd-control-plane --version 1.16.11
          helm search repo apisix/apisix --version 2.14.0
          helm search repo redpanda/redpanda --version 26.1.2
          helm search repo qdrant/qdrant --version 1.17.1
          helm search repo quickwit/quickwit --version 0.8.4
          helm search repo minio/minio --version 5.4.0
          helm search repo falco/falco --version 8.0.2
          helm search repo temporal/temporal --version 1.1.1
          helm search repo ory/kratos --version 0.61.1
          helm search repo grafana/loki-stack --version 2.10.3
          helm search repo kedacore/keda --version 2.19.0
          helm search repo vmware-tanzu/velero --version 12.0.0
          helm search repo backstage/backstage --version 2.6.3
          helm search repo longhorn/longhorn --version 1.11.1
          helm search repo loft/vcluster --version 0.33.1
          helm search repo open-policy-agent/gatekeeper --version 3.22.0
          helm search repo bitnami/postgresql --version 18.6.1
          helm search repo bitnami/redis --version 25.4.0
          helm search repo hashicorp/vault --version 0.32.0
          helm search repo jetstack/cert-manager --version v1.20.2
          helm search repo lago/lago --version 1.27.1
          helm search repo risingwave/risingwave --version 0.2.50
          helm search repo victoriametrics/victoria-metrics-single
          helm search repo weaviate/weaviate
          helm search repo analytics/victoria-metrics-single
          helm search repo billing/ledger
          helm search repo search/weaviate

  trivy-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on manifests
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: platform/
          severity: CRITICAL,HIGH
          exit-code: 1
