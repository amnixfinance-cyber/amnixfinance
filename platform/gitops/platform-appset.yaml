apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: amnixfinance-platform
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: cilium
        namespace: kube-system
        repoURL: https://helm.cilium.io
        chart: cilium
        version: 1.17.3
      - name: linkerd
        namespace: linkerd
        repoURL: https://helm.linkerd.io/stable
        chart: linkerd-control-plane
        version: 1.16.11
      - name: apisix
        namespace: apisix
        repoURL: https://charts.apiseven.com
        chart: apisix
        version: 2.10.0
      - name: redpanda
        namespace: redpanda
        repoURL: https://charts.redpanda.com
        chart: redpanda
        version: 5.9.23
      - name: qdrant
        namespace: qdrant
        repoURL: https://qdrant.github.io/qdrant-helm
        chart: qdrant
        version: 1.13.2
      - name: quickwit
        namespace: quickwit
        repoURL: https://helm.quickwit.io
        chart: quickwit
        version: 0.6.5
      - name: minio
        namespace: minio
        repoURL: https://charts.min.io
        chart: minio
        version: 5.4.0
      - name: grafana
        namespace: monitoring
        repoURL: https://grafana.github.io/helm-charts
        chart: loki-stack
        version: 2.10.2
      - name: falco
        namespace: falco
        repoURL: https://falcosecurity.github.io/charts
        chart: falco
        version: 4.21.2
      - name: temporal
        namespace: temporal
        repoURL: https://go.temporal.io/helm-charts
        chart: temporal
        version: 0.54.0
      - name: ory-kratos
        namespace: ory
        repoURL: https://k8s.ory.sh/helm/charts
        chart: kratos
        version: 0.42.0
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{version}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
