apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: amnixfinance-platform
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: cilium
        namespace: kube-system
        repoURL: https://helm.cilium.io
        chart: cilium
        version: 1.19.3
      - name: linkerd
        namespace: linkerd
        repoURL: https://helm.linkerd.io/stable
        chart: linkerd-control-plane
        version: 1.16.11
      - name: apisix
        namespace: apisix
        repoURL: https://charts.apiseven.com
        chart: apisix
        version: 2.14.0
      - name: redpanda
        namespace: redpanda
        repoURL: https://charts.redpanda.com
        chart: redpanda
        version: 26.1.2
      - name: qdrant
        namespace: qdrant
        repoURL: https://qdrant.github.io/qdrant-helm
        chart: qdrant
        version: 1.17.1
      - name: quickwit
        namespace: quickwit
        repoURL: https://helm.quickwit.io
        chart: quickwit
        version: 0.8.4
      - name: minio
        namespace: minio
        repoURL: https://charts.min.io
        chart: minio
        version: 5.4.0
      - name: falco
        namespace: falco
        repoURL: https://falcosecurity.github.io/charts
        chart: falco
        version: 8.0.2
      - name: temporal
        namespace: temporal
        repoURL: https://go.temporal.io/helm-charts
        chart: temporal
        version: 1.1.1
      - name: ory-kratos
        namespace: ory
        repoURL: https://k8s.ory.sh/helm/charts
        chart: kratos
        version: 0.61.1
      - name: loki-stack
        namespace: monitoring
        repoURL: https://grafana.github.io/helm-charts
        chart: loki-stack
        version: 2.10.3
      - name: keda
        namespace: keda
        repoURL: https://kedacore.github.io/charts
        chart: keda
        version: 2.19.0
      - name: velero
        namespace: velero
        repoURL: https://vmware-tanzu.github.io/helm-charts
        chart: velero
        version: 12.0.0
      - name: backstage
        namespace: backstage
        repoURL: https://backstage.github.io/charts
        chart: backstage
        version: 2.6.3
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{version}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
