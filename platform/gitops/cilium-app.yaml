apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.17.3
    helm:
      values: |
        kubeProxyReplacement: true
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
        operator:
          replicas: 2
        encryption:
          enabled: true
          type: wireguard
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
